services:
  idmp-verification-monitor:
    build: .
    container_name: idmp-verification-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONITOR_PORT: "8088"
    ports:
      - "${MONITOR_HOST_PORT:-18088}:8088"
    volumes:
      # Required so the monitor can stream logs from the IDMP container.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
